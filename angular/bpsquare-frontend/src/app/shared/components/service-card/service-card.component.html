<article class="service-card" [attr.aria-label]="service.title">
  <div class="service-card__icon" aria-hidden="true">
    <mat-icon>{{ service.icon || 'build' }}</mat-icon>
  </div>

  <h3 class="service-card__title">{{ service.title }}</h3>
  <p class="service-card__summary">{{ service.summary }}</p>

  @if (showFeatures && service.details && service.details.length) {
    <ul class="service-card__features" role="list">
      @for (feature of service.details; track feature) {
        <li class="service-card__feature">
          <mat-icon aria-hidden="true">check_circle</mat-icon>
          <span>{{ feature }}</span>
        </li>
      }
    </ul>
  }

  <a routerLink="/contact" class="service-card__cta" [attr.aria-label]="'Get started with ' + service.title">
    {{ service.ctaLabel || 'Get Started' }}
    <mat-icon aria-hidden="true">arrow_forward</mat-icon>
  </a>
</article>
