name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  angular:
    name: Angular build and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: angular/bpsquare-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: angular/bpsquare-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:ci

  wordpress:
    name: WordPress PHP lint and smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: PHP syntax check
        run: find wordpress/wp-content/plugins/bpsquare-core -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Validation smoke tests
        run: php wordpress/wp-content/plugins/bpsquare-core/tests/validation-service-smoke.php
